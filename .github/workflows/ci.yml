name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Run tests
  # ---------------------------------------------------------------------------
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          PIPELINE: ollama          # use offline defaults — no real services needed
          API_KEY: ""               # disabled in CI (dev mode)
          DB_IP: localhost          # dummy db labels to stop timeouts
          DB_PORT: 5432
          DB_NAME: test
          DB_USER: test
          DB_PASS: test
        run: pytest tests/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Job 2: Build and push Docker image (only on push to main)
  # ---------------------------------------------------------------------------
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to cloud VM (only on push to main, after image is pushed)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to cloud
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            cd ~/app

            # Pull latest docker-compose + nginx config
            git pull origin main

            # Write production .env from GitHub Secret
            echo "${{ secrets.DEPLOY_ENV }}" > .env

            # Pull new backend image and restart containers
            docker compose pull backend
            docker compose up -d

            # Health check — rollback if it fails
            sleep 10
            if ! curl -sf http://localhost:8000/v1/health; then
              echo "Health check failed — rolling back"
              docker compose rollout backend --rollback
              exit 1
            fi

            echo "Deployment successful"