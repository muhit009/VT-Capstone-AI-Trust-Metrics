server {
    listen 80;
    server_name _;

    # ------------------------------------------------------------------
    # Trust X-Forwarded-* from the cloud load balancer
    # so FastAPI rate limiting sees the real client IP, not the LB IP.
    # Adjust 10.0.0.0/8 to match your cloud VPC CIDR.
    # ------------------------------------------------------------------
    set_real_ip_from  10.0.0.0/8;
    real_ip_header    X-Forwarded-For;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-Frame-Options         "DENY"                          always;
    add_header X-XSS-Protection        "1; mode=block"                 always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always; 

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Proxy /api/* and /v1/* to the backend service.
    # "backend" resolves to the backend container via Docker's internal DNS.
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
    }

    location /v1/ {
        proxy_pass         http://backend:8000/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_connect_timeout 10s;
    }

    # React SPA — serve index.html for all unmatched routes so that
    # client-side routing (react-router-dom) works correctly.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}